<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				const t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (_) {}
		</script>
		<title>NIST PQC Signature Zoo</title>
		<meta name="description" content="Interactive comparison of post-quantum signature schemes submitted to the NIST Additional Signatures on-ramp." />
		<meta property="og:title" content="NIST PQC Signature Zoo" />
		<meta property="og:description" content="Interactive comparison of post-quantum signature schemes submitted to the NIST Additional Signatures on-ramp." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://pqshield.github.io/nist-sigs-zoo/" />
		<meta property="og:image" content="https://pqshield.github.io/nist-sigs-zoo/og-image.png" />
		<meta property="og:image:width" content="1056" />
		<meta property="og:image:height" content="216" />
		<meta property="og:site_name" content="NIST PQC Signature Zoo" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="NIST PQC Signature Zoo" />
		<meta name="twitter:description" content="Interactive comparison of post-quantum signature schemes submitted to the NIST Additional Signatures on-ramp." />
		<meta name="twitter:image" content="https://pqshield.github.io/nist-sigs-zoo/og-image.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
