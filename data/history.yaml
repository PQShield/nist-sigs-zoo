- date: '2026-06-04'
  type: attack
  description: "Improved MQ attack (Asanuma, Chen, Furue, Sakata &amp; Takagi, <a href=\"https://eprint.iacr.org/2026/1054\">ePrint 2026/1054</a>) reduces MAYO1 classical security estimate from 2^156 to 2^145. Still above NIST Level I threshold (128 bits); flagged as warning."
  schemes: [MAYO]

- date: '2026-05-26'
  type: update
  description: "Updated FAEST performance data to use the AVX2+AES-NI optimized implementation (<a href=\"https://github.com/faest-sign/faest-arch-opt\">faest-arch-opt</a>) instead of the reference implementation. Signing is 10–100× faster depending on the parameter set."
  schemes: [FAEST]

- date: '2026-05-26'
  type: update
  description: "Updated SNOVA to v2.3 (2026-04-03). Split round-2 and round-3 data: round-3 now shows the 14 current parameter sets from the v2.3 spec (l=4 variants retained with warnings, new q=19 variants, rectangular 4×5 structure added per \"Rectangular signatures\" update)."
  schemes: [SNOVA]

- date: '2026-05-14'
  type: milestone
  description: "NIST announced 9 Round 3 candidates for additional post-quantum signature schemes: FAEST, HAWK, MAYO, MQOM, QR-UOV, SDitH, SNOVA, SQIsign, UOV. Rationale in <a href=\"https://csrc.nist.gov/pubs/ir/8610/final\">NIST IR 8610</a>. <a href=\"https://csrc.nist.gov/projects/pqc-dig-sig/round-3-additional-signatures\">Round 3 candidates</a>."
  schemes: [FAEST, HAWK, MAYO, MQOM, QR-UOV, SDitH, SNOVA, SQIsign, UOV]

- date: '2026-05-09'
  type: attack
  description: "Updated UOV security flags based on pℓ-truncated polynomial ring intersection attack (Furue &amp; Ikematsu, <a href=\"https://eprint.iacr.org/2026/298\">ePrint 2026/298</a>). Improves on Ran's wedge attack for Ip (~128 bits), III (~182 bits), V (~223 bits). Is parameter sets newly flagged as warning (~159 bits, still above threshold)."
  schemes: [UOV]

- date: '2026-05-09'
  type: attack
  description: "Updated UOV and MAYO security flags based on wedge attack (Ran, <a href=\"https://eprint.iacr.org/2025/1143\">ePrint 2025/1143</a>). MAYO-2 (\"two\") marked broken (~113 bits, below 128-bit threshold). UOV Ip, III, and V parameter sets marked with warning (reduced but still above threshold). UOV Is unaffected."
  schemes: [UOV, MAYO]

- date: '2026-05-09'
  type: attack
  description: "Updated SNOVA security flags based on wedge product attack (Bros et al., <a href=\"https://eprint.iacr.org/2026/237\">ePrint 2026/237</a>). 6 parameter sets marked broken: (37 17 2), (25 8 3), (56 25 2), (24 5 5), (75 33 2), (29 6 5). 2 parameter sets marked with warning: (24 5 4), (37 8 4)."
  schemes: [SNOVA]

- date: '2026-05-08'
  type: update
  description: Updated 7 schemes to their latest published specifications. PERK redesigned parameter sets (v2.2.0). MQOM adds gf16 variants (v2.1). RYDE and Mirath corrected signature sizes and added faster variants. CROSS, SQIsign, and MAYO updated with revised benchmarks.
  schemes: [CROSS, MAYO, MQOM, Mirath, PERK, RYDE, SQIsign]

- date: '2026-05-07'
  type: update
  description: Fixed some typos in scheme data. <a href="https://github.com/PQShield/nist-sigs-zoo/commit/355b685ab03fa8f51b8bd1fec2b17e46ed701ffa">commit</a>

- date: '2026-05-07'
  type: update
  description: Website rewritten with SvelteKit, Tailwind CSS v4, and a new round selector, filter panel, and scatter plot.
