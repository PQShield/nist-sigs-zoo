name: BAT
website: https://github.com/pornin/BAT
category: Lattices
assumption: NTRU
status: Academic
info: Compact NTRU-based KEM (Fouque, Kirchner, Pornin, Yu; TCHES 2022) with notably small public keys and ciphertexts. A research design — not submitted to NIST or ISO. The two real security levels are shown; the BAT-128-256 toy set is omitted. Sizes are the encoded (transmitted) byte lengths and the timings include (de)serialisation; key generation is NTRU-style and comparatively slow.
